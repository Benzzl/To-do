        // 处理文件上传
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            currentFile = file;
            document.getElementById('analyze-btn').disabled = false;
            
            showNotification('提示', '文件已上传，请点击"分析数据"按钮', 'info');
        }

        // 分析数据
        function analyzeData() {
            if (!currentFile) {
                showNotification('错误', '请先上传文件', 'error');
                return;
            }
            
            const fileExtension = currentFile.name.split('.').pop().toLowerCase();
            
            if (fileExtension === 'csv') {
                parseCSV(currentFile);
            } else if (['xlsx', 'xls'].includes(fileExtension)) {
                showNotification('提示', 'Excel文件解析功能正在开发中，请使用CSV格式', 'info');
            } else {
                showNotification('错误', '不支持的文件格式', 'error');
            }
        }

        // 解析CSV文件
        function parseCSV(file) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const csvData = e.target.result;
                const parsedData = Papa.parse(csvData, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true
                });
                
                if (parsedData.errors.length > 0) {
                    showNotification('错误', 'CSV解析错误: ' + parsedData.errors[0].message, 'error');
                    return;
                }
                
                currentData = parsedData.data;
                displayDataPreview(currentData);
                populateColumnSelectors(parsedData.meta.fields);
                
                // 显示图表配置部分
                document.getElementById('data-preview-section').classList.remove('hidden');
                document.getElementById('chart-config-section').classList.remove('hidden');
                
                showNotification('成功', '数据解析完成', 'success');
            };
            
            reader.onerror = function() {
                showNotification('错误', '文件读取失败', 'error');
            };
            
            reader.readAsText(file);
        }

        // 显示数据预览
        function displayDataPreview(data) {
            const table = document.getElementById('data-preview-table');
            const previewData = data.slice(0, 5); // 只显示前5行
            
            if (previewData.length === 0) {
                table.innerHTML = '<tr><td colspan="100%" class="text-center py-4 text-gray-500">没有数据</td></tr>';
                return;
            }
            
            const headers = Object.keys(previewData[0]);
            
            // 创建表头
            let thead = '<thead><tr>';
            headers.forEach(header => {
                thead += `<th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">${header}</th>`;
            });
            thead += '</tr></thead>';
            
            // 创建表体
            let tbody = '<tbody class="divide-y divide-gray-200">';
            previewData.forEach(row => {
                tbody += '<tr>';
                headers.forEach(header => {
                    tbody += `<td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">${row[header] || ''}</td>`;
                });
                tbody += '</tr>';
            });
            tbody += '</tbody>';
            
            table.innerHTML = thead + tbody;
        }

        // 填充列选择器
        function populateColumnSelectors(fields) {
            const xAxisSelect = document.getElementById('x-axis-select');
            const yAxisSelect = document.getElementById('y-axis-select');
            
            // 清空现有选项
            xAxisSelect.innerHTML = '';
            yAxisSelect.innerHTML = '';
            
            // 添加选项
            fields.forEach(field => {
                xAxisSelect.innerHTML += `<option value="${field}">${field}</option>`;
                yAxisSelect.innerHTML += `<option value="${field}">${field}</option>`;
            });
            
            // 默认选择第一列作为X轴，第二列作为Y轴
            if (fields.length > 1) {
                xAxisSelect.value = fields[0];
                yAxisSelect.value = fields[1];
            }
        }

        // 生成图表
        function generateChart() {
            if (!currentData || currentData.length === 0) {
                showNotification('错误', '没有可用的数据', 'error');
                return;
            }
            
            const xAxisColumn = document.getElementById('x-axis-select').value;
            const yAxisColumn = document.getElementById('y-axis-select').value;
            const chartType = document.getElementById('chart-type-select').value;
            const chartTitle = document.getElementById('chart-title').value || '数据可视化';
            
            // 设置图表标题
            document.getElementById('displayed-chart-title').textContent = chartTitle;
            
            // 准备数据
            const labels = currentData.map(item => item[xAxisColumn]);
            const data = currentData.map(item => item[yAxisColumn]);
            
            // 创建或更新图表
            const ctx = document.getElementById('data-visualization-chart').getContext('2d');
            
            if (dataVisualizationChart) {
                dataVisualizationChart.destroy();
            }
            
            dataVisualizationChart = new Chart(ctx, {
                type: chartType,
                data: {
                    labels: labels,
                    datasets: [{
                        label: yAxisColumn,
                        data: data,
                        backgroundColor: getChartColors(chartType),
                        borderColor: '#3b82f6',
                        borderWidth: 1,
                        pointBackgroundColor: '#3b82f6',
                        pointRadius: 4,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: chartTitle,
                            font: {
                                size: 16,
                                weight: 'bold'
                            }
                        },
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            callbacks: {
                                title: function(context) {
                                    return `${xAxisColumn}: ${context[0].label}`;
                                },
                                label: function(context) {
                                    return `${yAxisColumn}: ${context.raw}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: xAxisColumn
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: yAxisColumn
                            },
                            beginAtZero: false
                        }
                    }
                }
            });
            
            // 显示图表和分析部分
            document.getElementById('chart-display-section').classList.remove('hidden');
            document.getElementById('data-analysis-section').classList.remove('hidden');
            
            // 执行数据分析
            performDataAnalysis(currentData, xAxisColumn, yAxisColumn);
            
            // 滚动到图表
            document.getElementById('chart-display-section').scrollIntoView({ behavior: 'smooth' });
        }

        // 获取图表颜色
        function getChartColors(chartType) {
            if (chartType === 'line' || chartType === 'scatter') {
                return 'rgba(59, 130, 246, 0.2)';
            } else if (chartType === 'bar') {
                return Array(20).fill().map((_, i) => {
                    const hue = (i * 137) % 360; // 使用黄金角分布获取不同的色相
                    return `hsla(${hue}, 70%, 60%, 0.7)`;
                });
            }
            return 'rgba(59, 130, 246, 0.7)';
        }

        // 执行数据分析
        function performDataAnalysis(data, xColumn, yColumn) {
            const analysisResults = document.getElementById('data-analysis-results');
            
            // 提取Y轴数据
            const yValues = data.map(item => item[yColumn]).filter(val => typeof val === 'number' && !isNaN(val));
            
            if (yValues.length === 0) {
                analysisResults.innerHTML = `
                    <div class="text-center text-gray-500 py-4">
                        无法分析数据，Y轴列中没有有效的数值
                    </div>
                `;
                return;
            }
            
            // 计算基本统计量
            const stats = calculateStatistics(yValues);
            
            // 生成分析结果HTML
            analysisResults.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <h3 class="text-lg font-semibold mb-3">基本统计</h3>
                        <table class="min-w-full divide-y divide-gray-200">
                            <tbody class="divide-y divide-gray-200">
                                <tr>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm font-medium text-gray-900">数据点数量</td>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">${stats.count}</td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm font-medium text-gray-900">最小值</td>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">${stats.min.toFixed(2)}</td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm font-medium text-gray-900">最大值</td>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">${stats.max.toFixed(2)}</td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm font-medium text-gray-900">平均值</td>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">${stats.mean.toFixed(2)}</td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm font-medium text-gray-900">中位数</td>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">${stats.median.toFixed(2)}</td>
                                </tr>
                                <tr>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm font-medium text-gray-900">标准差</td>
                                    <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">${stats.stdDev.toFixed(2)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold mb-3">数据分布</h3>
                        <div class="h-64">
                            <canvas id="distribution-chart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="mt-6">
                    <h3 class="text-lg font-semibold mb-3">趋势分析</h3>
                    <p class="text-gray-700">
                        ${generateTrendAnalysis(data, xColumn, yColumn, stats)}
                    </p>
                </div>
            `;
            
            // 创建分布图表
            createDistributionChart(yValues, yColumn);
        }

        // 计算统计量
        function calculateStatistics(values) {
            const sortedValues = [...values].sort((a, b) => a - b);
            const count = sortedValues.length;
            const min = sortedValues[0];
            const max = sortedValues[count - 1];
            const sum = sortedValues.reduce((acc, val) => acc + val, 0);
            const mean = sum / count;
            
            // 计算中位数
            let median;
            if (count % 2 === 0) {
                median = (sortedValues[count / 2 - 1] + sortedValues[count / 2]) / 2;
            } else {
                median = sortedValues[Math.floor(count / 2)];
            }
            
            // 计算标准差
            const variance = sortedValues.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / count;
            const stdDev = Math.sqrt(variance);
            
            return {
                count,
                min,
                max,
                sum,
                mean,
                median,
                variance,
                stdDev
            };
        }

        // 创建分布图表
        function createDistributionChart(values, label) {
            const ctx = document.getElementById('distribution-chart').getContext('2d');
            
            // 创建直方图数据
            const numBins = Math.min(10, Math.ceil(Math.sqrt(values.length)));
            const min = Math.min(...values);
            const max = Math.max(...values);
            const binWidth = (max - min) / numBins;
            
            const bins = Array(numBins).fill(0);
            const binLabels = [];
            
            for (let i = 0; i < numBins; i++) {
                const binStart = min + i * binWidth;
                const binEnd = min + (i + 1) * binWidth;
                binLabels.push(`${binStart.toFixed(1)}-${binEnd.toFixed(1)}`);
            }
            
            values.forEach(value => {
                let binIndex = Math.min(Math.floor((value - min) / binWidth), numBins - 1);
                bins[binIndex]++;
            });
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: binLabels,
                    datasets: [{
                        label: `${label} 分布`,
                        data: bins,
                        backgroundColor: 'rgba(59, 130, 246, 0.7)',
                        borderColor: 'rgba(59, 130, 246, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '区间'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '频数'
                            },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // 生成趋势分析文本
        function generateTrendAnalysis(data, xColumn, yColumn, stats) {
            // 简单线性回归分析
            const xValues = data.map(item => typeof item[xColumn] === 'number' ? item[xColumn] : parseFloat(item[xColumn]))
                               .filter(val => !isNaN(val));
            const yValues = data.map(item => typeof item[yColumn] === 'number' ? item[yColumn] : parseFloat(item[yColumn]))
                               .filter(val => !isNaN(val));
            
            if (xValues.length !== yValues.length || xValues.length < 2) {
                return `数据包含 ${stats.count} 个数据点，范围从 ${stats.min.toFixed(2)} 到 ${stats.max.toFixed(2)}。平均值为 ${stats.mean.toFixed(2)}，标准差为 ${stats.stdDev.toFixed(2)}。由于数据量不足，无法进行趋势分析。`;
            }
            
            const regression = calculateLinearRegression(xValues, yValues);
            const correlation = calculateCorrelation(xValues, yValues);
            
            let trendDirection = '';
            let correlationStrength = '';
            
            if (regression.slope > 0) {
                trendDirection = '上升';
            } else if (regression.slope < 0) {
                trendDirection = '下降';
            } else {
                trendDirection = '保持稳定';
            }
            
            const absCorrelation = Math.abs(correlation);
            if (absCorrelation > 0.7) {
                correlationStrength = '强';
            } else if (absCorrelation > 0.3) {
                correlationStrength = '中等';
            } else {
                correlationStrength = '弱';
            }
            
            const correlationDirection = correlation > 0 ? '正' : '负';
            
            return `数据包含 ${stats.count} 个数据点，范围从 ${stats.min.toFixed(2)} 到 ${stats.max.toFixed(2)}。平均值为 ${stats.mean.toFixed(2)}，标准差为 ${stats.stdDev.toFixed(2)}。
            <br><br>
            分析显示，随着 ${xColumn} 的增加，${yColumn} 呈现 ${trendDirection} 趋势。两者之间存在 ${correlationStrength}${correlationDirection}相关关系（相关系数：${correlation.toFixed(2)}）。
            <br><br>
            回归方程：${yColumn} = ${regression.intercept.toFixed(2)} + ${regression.slope.toFixed(2)} × ${xColumn}
            <br><br>
            ${generateInsight(correlation, regression.slope, stats)}`;
        }

        // 计算线性回归
        function calculateLinearRegression(x, y) {
            const n = x.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
            
            for (let i = 0; i < n; i++) {
                sumX += x[i];
                sumY += y[i];
                sumXY += x[i] * y[i];
                sumX2 += x[i] * x[i];
            }
            
            const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            const intercept = (sumY - slope * sumX) / n;
            
            return { slope, intercept };
        }

        // 计算相关系数
        function calculateCorrelation(x, y) {
            const n = x.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;
            
            for (let i = 0; i < n; i++) {
                sumX += x[i];
                sumY += y[i];
                sumXY += x[i] * y[i];
                sumX2 += x[i] * x[i];
                sumY2 += y[i] * y[i];
            }
            
            const numerator = n * sumXY - sumX * sumY;
            const denominator = Math.sqrt((n * sumX2 - sumX * sumX) * (n * sumY2 - sumY * sumY));
            
            return denominator === 0 ? 0 : numerator / denominator;
        }

        // 生成洞察
        function generateInsight(correlation, slope, stats) {
            const absCorrelation = Math.abs(correlation);
            const absSlope = Math.abs(slope);
            
            if (absCorrelation > 0.7) {
                if (absSlope > 1) {
                    return `数据显示出显著的相关性，${absCorrelation > 0.8 ? '这表明两者之间可能存在因果关系' : '建议进一步研究这种关系'}。`;
                } else {
                    return `虽然相关性很强，但变化幅度相对较小，可能需要考虑其他影响因素。`;
                }
            } else if (absCorrelation > 0.3) {
                return `存在中等程度的相关性，建议结合其他数据或因素进行综合分析。`;
            } else {
                return `相关性较弱，${yColumn} 的变化可能受到多种因素的影响，建议收集更多数据或考虑其他变量。`;
            }
        }

        // 下载图表
        function downloadChart() {
            if (!dataVisualizationChart) {
                showNotification('错误', '没有可下载的图表', 'error');
                return;
            }
            
            const canvas = document.getElementById('data-visualization-chart');
            const image = canvas.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = '数据可视化图表.png';
            link.href = image;
            link.click();
            
            showNotification('成功', '图表已下载', 'success');
        }

        // 显示确认对话框
        function showConfirmDialog(title, message, confirmCallback) {
            const dialog = document.getElementById('confirm-dialog');
            const titleElement = document.getElementById('confirm-title');
            const messageElement = document.getElementById('confirm-message');
            const confirmBtn = document.getElementById('confirm-ok');
            
            titleElement.textContent = title;
            messageElement.textContent = message;
            
            // 移除之前的事件监听器
            const newConfirmBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);
            
            // 添加新的事件监听器
            newConfirmBtn.addEventListener('click', function() {
                dialog.classList.add('hidden');
                if (typeof confirmCallback === 'function') {
                    confirmCallback();
                }
            });
            
            document.getElementById('confirm-cancel').addEventListener('click', function() {
                dialog.classList.add('hidden');
            });
            
            dialog.classList.remove('hidden');
        }

        // 显示通知
        function showNotification(title, message, type = 'info', duration = 3000) {
            const notification = document.getElementById('notification');
            const titleElement = document.getElementById('notification-title');
            const messageElement = document.getElementById('notification-message');
            const iconElement = document.getElementById('notification-icon');
            
            titleElement.textContent = title;
            messageElement.textContent = message;
            
            // 设置图标和颜色
            iconElement.className = 'flex-shrink-0';
            
            switch (type) {
                case 'success':
                    iconElement.innerHTML = '<i class="fa fa-check-circle text-xl"></i>';
                    iconElement.classList.add('text-success');
                    break;
                case 'error':
                    iconElement.innerHTML = '<i class="fa fa-exclamation-circle text-xl"></i>';
                    iconElement.classList.add('text-danger');
                    break;
                case 'warning':
                    iconElement.innerHTML = '<i class="fa fa-exclamation-triangle text-xl"></i>';
                    iconElement.classList.add('text-warning');
                    break;
                default:
                    iconElement.innerHTML = '<i class="fa fa-info-circle text-xl"></i>';
                    iconElement.classList.add('text-primary');
            }
            
            // 显示通知
            notification.classList.remove('translate-y-full', 'opacity-0');
            
            // 设置自动隐藏时间
            clearTimeout(notification.hideTimeout);
            if (duration > 0) {
                notification.hideTimeout = setTimeout(hideNotification, duration);
            }
        }
        
        // 显示任务提醒
        function showTaskReminder(task, reminderMinutes = 0) {
            // 保存当前提醒任务
            currentReminderTask = task;
            
            // 播放提醒声音
            playReminderSound();
            
            // 显示浏览器通知
            if (notificationPermission === 'granted') {
                const notificationTitle = reminderMinutes > 0 
                    ? `任务即将到期 (${reminderMinutes}分钟后)` 
                    : '任务已到期';
                
                const notification = new Notification(notificationTitle, {
                    body: task.title,
                    icon: 'https://cdn-icons-png.flaticon.com/512/6134/6134678.png',
                    tag: task.id,
                    requireInteraction: true, // 保持通知直到用户交互
                    renotify: true // 允许重复通知
                });
                
                notification.onclick = function() {
                    window.focus();
                    notification.close();
                    showTaskReminderModal(task);
                };
            } else {
                // 如果没有通知权限，显示页面内通知
                showNotification(
                    reminderMinutes > 0 ? `任务即将到期` : `任务已到期`,
                    `${task.title} ${reminderMinutes > 0 ? `将在 ${reminderMinutes} 分钟后到期` : '已到期！'}`,
                    'warning',
                    10000 // 持续10秒
                );
            }
            
            // 显示页面内提醒
            showTaskReminderModal(task, reminderMinutes);
        }
        
        // 显示任务提醒模态框
        function showTaskReminderModal(task, reminderMinutes = 0) {
            const reminder = document.getElementById('task-reminder');
            const reminderTitle = document.getElementById('reminder-task-title');
            const reminderMessage = document.getElementById('reminder-message');
            
            reminderTitle.textContent = task.title;
            
            if (reminderMinutes > 0) {
                reminderMessage.textContent = `该任务将在 ${reminderMinutes} 分钟后到期`;
            } else {
                reminderMessage.textContent = '该任务已到期！';
            }
            
            // 根据优先级设置边框颜色
            const borderClass = getPriorityBorderClass(task.priority);
            reminder.className = reminder.className.replace(/border-\w+/g, '') + ` ${borderClass}`;
            
            // 显示提醒
            reminder.classList.remove('hidden');
            
            // 高亮显示
            highlightTaskInList(task.id);
        }
        
        // 播放提醒声音
        function playReminderSound() {
            const sound = document.getElementById('reminder-sound');
            sound.currentTime = 0;
            sound.play().catch(e => {
                console.log('无法播放声音:', e);
            });
        }
        
        // 高亮显示任务列表中的任务
        function highlightTaskInList(taskId) {
            const taskElement = document.querySelector(`.task-item[data-id="${taskId}"]`);
            if (taskElement) {
                taskElement.classList.add('bg-yellow-50', 'border-yellow-300');
                
                // 10秒后移除高亮
                setTimeout(() => {
                    taskElement.classList.remove('bg-yellow-50', 'border-yellow-300');
                }, 10000);
            }
        }
        
        // 检查任务提醒
        function checkTaskReminders() {
            const now = new Date();
            
            tasks.forEach(task => {
                // 跳过已完成的任务
                if (task.status === 'completed' || !task.dueDateTime) return;
                
                const dueDate = new Date(task.dueDateTime);
                const timeDiff = dueDate - now;
                
                // 如果任务已过期超过1天，则不再提醒
                if (timeDiff < -24 * 60 * 60 * 1000) return;
                
                // 检查是否设置了提醒
                if (task.reminders && task.reminders.length > 0) {
                    task.reminders.forEach(reminderMinutes => {
                        const reminderTime = reminderMinutes * 60 * 1000;
                        const timeToReminder = timeDiff - reminderTime;
                        
                        // 如果到达提醒时间（允许1分钟的误差）
                        if (timeToReminder <= 60000 && timeToReminder > -60000) {
                            // 检查是否已经提醒过
                            const lastReminderKey = `last_reminder_${task.id}_${reminderMinutes}`;
                            const lastReminder = localStorage.getItem(lastReminderKey);
                            const nowTime = now.getTime();
                            
                            // 如果上次提醒时间超过10分钟，则再次提醒
                            if (!lastReminder || (nowTime - parseInt(lastReminder)) > 10 * 60 * 1000) {
                                showTaskReminder(task, reminderMinutes);
                                localStorage.setItem(lastReminderKey, nowTime.toString());
                            }
                        }
                    });
                }
            });
        }
        
        // 获取优先级边框类
        function getPriorityBorderClass(priority) {
            switch (priority) {
                case 'low': return 'border-green-500';
                case 'medium': return 'border-yellow-500';
                case 'high': return 'border-red-500';
                default: return 'border-blue-500';
            }
        }

        // 隐藏通知
        function hideNotification() {
            const notification = document.getElementById('notification');
            notification.classList.add('translate-y-full', 'opacity-0');
        }

        // 辅助函数：生成唯一ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        // 辅助函数：格式化日期
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN');
        }

        // 辅助函数：格式化日期时间
        function formatDateTime(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        // 辅助函数：检查是否逾期
        function isOverdue(dateString) {
            if (!dateString) return false;
            const now = new Date();
            const dueDate = new Date(dateString);
            return dueDate < now;
        }

        // 辅助函数：获取优先级文本
        function getPriorityText(priority) {
            switch (priority) {
                case 'low': return '低';
                case 'medium': return '中';
                case 'high': return '高';
                default: return '无';
            }
        }

        // 辅助函数：获取优先级徽章类
        function getPriorityBadgeClass(priority) {
            switch (priority) {
                case 'low': return 'badge-low';
                case 'medium': return 'badge-medium';
                case 'high': return 'badge-high';
                default: return 'badge-secondary';
            }
        }

        // 辅助函数：获取状态文本
        function getStatusText(status) {
            switch (status) {
                case 'pending': return '待办';
                case 'in-progress': return '进行中';
                case 'completed': return '已完成';
                default: return '未知';
            }
        }

        // 辅助函数：获取状态徽章类
        function getStatusBadgeClass(status) {
            switch (status) {
                case 'pending': return 'badge-secondary';
                case 'in-progress': return 'badge-warning';
                case 'completed': return 'badge-success';
                default: return 'badge-secondary';
            }
        }

        // 添加Papa Parse库用于CSV解析
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js';
        document.head.appendChild(script);
    </script>
