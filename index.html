<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理与数据可视化系统</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <!-- 统一的 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#22c55e',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        light: '#f8fafc',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all {
                transition-property: all;
                transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
                transition-duration: 150ms;
            }
            .card {
                @apply bg-white rounded-lg shadow-md p-6 transition-all hover:shadow-lg;
            }
            .btn {
                @apply px-4 py-2 rounded-md font-medium transition-all focus:outline-none focus:ring-2 focus:ring-offset-2;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-blue-600 focus:ring-blue-500;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-slate-600 focus:ring-slate-500;
            }
            .btn-success {
                @apply bg-success text-white hover:bg-green-600 focus:ring-green-500;
            }
            .btn-danger {
                @apply bg-danger text-white hover:bg-red-600 focus:ring-red-500;
            }
            .input-field {
                @apply w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent;
            }
            .badge {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium;
            }
            .badge-low {
                @apply bg-green-100 text-green-800;
            }
            .badge-medium {
                @apply bg-yellow-100 text-yellow-800;
            }
            .badge-high {
                @apply bg-red-100 text-red-800;
            }
            .nav-link {
                @apply px-3 py-2 rounded-md text-sm font-medium transition-all;
            }
            .nav-link-active {
                @apply bg-primary text-white;
            }
            .nav-link-inactive {
                @apply text-gray-600 hover:bg-gray-100;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- 头部 -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">任务管理与数据可视化系统</h1>
            <div class="flex space-x-1 border-b border-gray-200">
                <button id="nav-tasks" class="nav-link nav-link-active">
                    <i class="fa fa-tasks mr-1"></i> 任务管理
                </button>
                <button id="nav-visualization" class="nav-link nav-link-inactive">
                    <i class="fa fa-bar-chart mr-1"></i> 数据可视化
                </button>
                <button id="nav-recycle" class="nav-link nav-link-inactive">
                    <i class="fa fa-trash mr-1"></i> 回收站
                </button>
                <span class="ml-auto text-sm text-gray-500 flex items-center">
                    <i class="fa fa-question-circle mr-1"></i> 帮助
                </span>
            </div>
        </header>

        <!-- 主内容区 -->
        <main>
            <!-- 任务管理页面 -->
            <section id="tasks-section" class="space-y-6">
                <!-- 任务筛选 -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">优先级</label>
                        <select id="priority-filter" class="input-field">
                            <option value="all">全部</option>
                            <option value="low">低</option>
                            <option value="medium">中</option>
                            <option value="high">高</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                        <select id="status-filter" class="input-field">
                            <option value="all">全部</option>
                            <option value="pending">待办</option>
                            <option value="in-progress">进行中</option>
                            <option value="completed">已完成</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">截止日期</label>
                        <input type="date" id="due-date-filter" class="input-field">
                    </div>
                    <div class="flex items-end">
                        <button id="add-task-btn" class="btn btn-primary w-full">
                            <i class="fa fa-plus mr-1"></i> 添加任务
                        </button>
                    </div>
                </div>

                <!-- 任务列表 -->
                <div class="card">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">任务列表</h2>
                    <div id="tasks-list" class="space-y-3">
                        <!-- 任务项将通过JavaScript动态生成 -->
                        <div class="text-center text-gray-500 py-8">
                            暂无任务，请添加新任务
                        </div>
                    </div>
                </div>

                <!-- 任务统计 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="card">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">任务统计</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="text-center">
                                <p class="text-sm text-gray-500">完成进度</p>
                                <p id="completion-rate" class="text-2xl font-bold text-primary">0/0 (0%)</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm text-gray-500">总任务数</p>
                                <p id="total-tasks" class="text-2xl font-bold text-gray-800">0</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm text-gray-500">已完成</p>
                                <p id="completed-tasks" class="text-2xl font-bold text-success">0</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm text-gray-500">进行中</p>
                                <p id="in-progress-tasks" class="text-2xl font-bold text-warning">0</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm text-gray-500">高优先级</p>
                                <p id="high-priority-tasks" class="text-2xl font-bold text-danger">0</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm text-gray-500">待处理</p>
                                <p id="pending-tasks" class="text-2xl font-bold text-secondary">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">优先级分布</h3>
                        <div class="h-64">
                            <canvas id="priority-chart"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 数据可视化页面 -->
            <section id="visualization-section" class="space-y-6 hidden">
                <!-- 文件上传 -->
                <div class="card">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">数据导入</h2>
                    <div class="flex items-center space-x-4">
                        <div class="flex-1">
                            <label for="file-upload" class="block text-sm font-medium text-gray-700 mb-1">上传CSV或Excel文件</label>
                            <input type="file" id="file-upload" accept=".csv,.xlsx,.xls" class="input-field">
                            <p class="mt-1 text-xs text-gray-500">支持CSV、Excel格式，文件应包含x轴和y轴数据列</p>
                        </div>
                        <div class="flex items-end">
                            <button id="analyze-btn" class="btn btn-primary" disabled>
                                <i class="fa fa-line-chart mr-1"></i> 分析数据
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 数据预览 -->
                <div id="data-preview-section" class="card hidden">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">数据预览</h2>
                    <div class="overflow-x-auto">
                        <table id="data-preview-table" class="min-w-full divide-y divide-gray-200">
                            <!-- 表格内容将通过JavaScript动态生成 -->
                        </table>
                    </div>
                </div>

                <!-- 图表配置 -->
                <div id="chart-config-section" class="card hidden">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">图表配置</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="x-axis-select" class="block text-sm font-medium text-gray-700 mb-1">X轴数据列</label>
                            <select id="x-axis-select" class="input-field">
                                <!-- 选项将通过JavaScript动态生成 -->
                            </select>
                        </div>
                        <div>
                            <label for="y-axis-select" class="block text-sm font-medium text-gray-700 mb-1">Y轴数据列</label>
                            <select id="y-axis-select" class="input-field">
                                <!-- 选项将通过JavaScript动态生成 -->
                            </select>
                        </div>
                        <div>
                            <label for="chart-type-select" class="block text-sm font-medium text-gray-700 mb-1">图表类型</label>
                            <select id="chart-type-select" class="input-field">
                                <option value="line">折线图</option>
                                <option value="bar">柱状图</option>
                                <option value="scatter">散点图</option>
                            </select>
                        </div>
                        <div>
                            <label for="chart-title" class="block text-sm font-medium text-gray-700 mb-1">图表标题</label>
                            <input type="text" id="chart-title" class="input-field" placeholder="输入图表标题">
                        </div>
                    </div>
                    <div class="mt-4">
                        <button id="generate-chart-btn" class="btn btn-primary">
                            <i class="fa fa-bar-chart mr-1"></i> 生成图表
                        </button>
                    </div>
                </div>

                <!-- 图表展示 -->
                <div id="chart-display-section" class="card hidden">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">
                        <span id="displayed-chart-title">数据可视化</span>
                        <button id="download-chart-btn" class="btn btn-secondary ml-4 text-sm">
                            <i class="fa fa-download mr-1"></i> 下载图表
                        </button>
                    </h2>
                    <div class="h-96">
                        <canvas id="data-visualization-chart"></canvas>
                    </div>
                </div>

                <!-- 数据分析 -->
                <div id="data-analysis-section" class="card hidden">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">数据分析</h2>
                    <div id="data-analysis-results" class="prose max-w-none">
                        <!-- 分析结果将通过JavaScript动态生成 -->
                    </div>
                </div>
            </section>

            <!-- 回收站页面 -->
            <section id="recycle-section" class="space-y-6 hidden">
                <div class="card">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">回收站</h2>
                        <button id="empty-recycle-btn" class="btn btn-danger text-sm">
                            <i class="fa fa-trash-o mr-1"></i> 清空回收站
                        </button>
                    </div>
                    <div id="recycle-list" class="space-y-3">
                        <!-- 回收站项目将通过JavaScript动态生成 -->
                        <div class="text-center text-gray-500 py-8">
                            回收站为空
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 添加/编辑任务模态框 -->
    <div id="task-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h3 id="task-modal-title" class="text-lg font-semibold text-gray-800">添加任务</h3>
                <button id="close-task-modal" class="text-gray-400 hover:text-gray-500">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="space-y-4">
                    <div>
                        <label for="task-title" class="block text-sm font-medium text-gray-700 mb-1">任务标题 <span class="text-red-500">*</span></label>
                        <input type="text" id="task-title" class="input-field" required>
                    </div>
                    <div>
                        <label for="task-description" class="block text-sm font-medium text-gray-700 mb-1">任务描述</label>
                        <textarea id="task-description" rows="3" class="input-field"></textarea>
                    </div>
                    <div>
                        <label for="task-priority" class="block text-sm font-medium text-gray-700 mb-1">优先级</label>
                        <select id="task-priority" class="input-field">
                            <option value="low">低</option>
                            <option value="medium">中</option>
                            <option value="high">高</option>
                        </select>
                    </div>
                    <div>
                        <label for="task-due-date" class="block text-sm font-medium text-gray-700 mb-1">截止日期</label>
                        <input type="date" id="task-due-date" class="input-field">
                    </div>
                    <div>
                        <label for="task-due-time" class="block text-sm font-medium text-gray-700 mb-1">截止时间</label>
                        <input type="time" id="task-due-time" class="input-field">
                    </div>
                    <div>
                        <label for="task-status" class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                        <select id="task-status" class="input-field">
                            <option value="pending">待办</option>
                            <option value="in-progress">进行中</option>
                            <option value="completed">已完成</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">提醒时间</label>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="inline-flex items-center">
                                <input type="checkbox" class="reminder-option h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" value="5">
                                <span class="ml-2 text-sm text-gray-700">提前5分钟</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="checkbox" class="reminder-option h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" value="10">
                                <span class="ml-2 text-sm text-gray-700">提前10分钟</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="checkbox" class="reminder-option h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" value="30">
                                <span class="ml-2 text-sm text-gray-700">提前30分钟</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="checkbox" class="reminder-option h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" value="60">
                                <span class="ml-2 text-sm text-gray-700">提前1小时</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="checkbox" class="reminder-option h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" value="1440">
                                <span class="ml-2 text-sm text-gray-700">提前1天</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="checkbox" class="reminder-option h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" value="0">
                                <span class="ml-2 text-sm text-gray-700">到期提醒</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="mt-6 flex justify-end space-x-3">
                    <button type="button" id="cancel-task-btn" class="btn btn-secondary">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div id="confirm-dialog" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-sm">
            <h3 id="confirm-title" class="text-lg font-semibold text-gray-800 mb-2">确认操作</h3>
            <p id="confirm-message" class="text-gray-600 mb-4">您确定要执行此操作吗？</p>
            <div class="flex justify-end space-x-3">
                <button id="confirm-cancel" class="btn btn-secondary">取消</button>
                <button id="confirm-ok" class="btn btn-danger">确认</button>
            </div>
        </div>
    </div>

    <!-- 通知提示 -->
    <div id="notification" class="fixed bottom-4 right-4 bg-white rounded-lg shadow-lg p-4 max-w-sm transform translate-y-full opacity-0 transition-all duration-300 z-50">
        <div class="flex items-start">
            <div id="notification-icon" class="flex-shrink-0 text-primary">
                <i class="fa fa-info-circle text-xl"></i>
            </div>
            <div class="ml-3 flex-1">
                <p id="notification-title" class="text-sm font-medium text-gray-800">通知标题</p>
                <p id="notification-message" class="text-sm text-gray-600 mt-1">通知内容</p>
            </div>
            <button id="close-notification" class="text-gray-400 hover:text-gray-500">
                <i class="fa fa-times"></i>
            </button>
        </div>
    </div>
    
    <!-- 任务提醒通知 -->
    <div id="task-reminder" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded-lg shadow-xl p-6 max-w-md w-full mx-4 border-l-4 border-warning z-50 hidden">
        <div class="flex items-start">
            <div class="flex-shrink-0 text-warning">
                <i class="fa fa-bell text-3xl animate-pulse"></i>
            </div>
            <div class="ml-4 flex-1">
                <h3 id="reminder-title" class="text-lg font-bold text-gray-800">任务提醒</h3>
                <p id="reminder-task-title" class="text-xl font-semibold text-gray-900 mt-2">任务标题</p>
                <p id="reminder-message" class="text-gray-600 mt-2">任务提醒内容</p>
                <div class="mt-4 flex justify-end space-x-3">
                    <button id="snooze-reminder" class="btn btn-secondary">稍后提醒</button>
                    <button id="dismiss-reminder" class="btn btn-primary">查看任务</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 音频元素 -->
    <audio id="reminder-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 全局变量
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let recycledTasks = JSON.parse(localStorage.getItem('recycledTasks')) || [];
        let priorityChart = null;
        let dataVisualizationChart = null;
        let currentData = null;
        let currentFile = null;
        let reminderTimers = [];
        let notificationPermission = 'default';
        let currentReminderTask = null;

        // DOM 加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化导航
            initNavigation();
            
            // 初始化任务管理
            initTaskManagement();
            
            // 初始化数据可视化
            initDataVisualization();
            
            // 初始化回收站
            initRecycleBin();
            
            // 初始化通知系统
            initNotification();
            
            // 初始化优先级图表
            initPriorityChart();
            
            // 初始化提醒系统
            initReminders();
            
            // 请求通知权限
            requestNotificationPermission();
            
            // 加载并显示任务
            loadTasks();
            
            // 每分钟检查一次任务提醒
            setInterval(checkTaskReminders, 60000);
        });

        // 初始化导航
        function initNavigation() {
            const navLinks = ['nav-tasks', 'nav-visualization', 'nav-recycle'];
            const sections = ['tasks-section', 'visualization-section', 'recycle-section'];
            
            navLinks.forEach((navId, index) => {
                document.getElementById(navId).addEventListener('click', function() {
                    // 更新导航链接样式
                    navLinks.forEach(id => {
                        document.getElementById(id).classList.remove('nav-link-active');
                        document.getElementById(id).classList.add('nav-link-inactive');
                    });
                    this.classList.remove('nav-link-inactive');
                    this.classList.add('nav-link-active');
                    
                    // 显示对应部分
                    sections.forEach(sectionId => {
                        document.getElementById(sectionId).classList.add('hidden');
                    });
                    document.getElementById(sections[index]).classList.remove('hidden');
                });
            });
        }

        // 初始化任务管理
        function initTaskManagement() {
            // 添加任务按钮
            document.getElementById('add-task-btn').addEventListener('click', function() {
                openTaskModal();
            });
            
            // 关闭模态框按钮
            document.getElementById('close-task-modal').addEventListener('click', function() {
                closeTaskModal();
            });
            
            document.getElementById('cancel-task-btn').addEventListener('click', function() {
                closeTaskModal();
            });
            
            // 任务表单提交
            document.getElementById('task-form').addEventListener('submit', function(e) {
                e.preventDefault();
                saveTask();
            });
            
            // 筛选器事件监听
            document.getElementById('priority-filter').addEventListener('change', filterTasks);
            document.getElementById('status-filter').addEventListener('change', filterTasks);
            document.getElementById('due-date-filter').addEventListener('change', filterTasks);
        }

        // 初始化数据可视化
        function initDataVisualization() {
            // 文件上传事件
            document.getElementById('file-upload').addEventListener('change', handleFileUpload);
            
            // 分析数据按钮
            document.getElementById('analyze-btn').addEventListener('click', analyzeData);
            
            // 生成图表按钮
            document.getElementById('generate-chart-btn').addEventListener('click', generateChart);
            
            // 下载图表按钮
            document.getElementById('download-chart-btn').addEventListener('click', downloadChart);
        }

        // 初始化回收站
        function initRecycleBin() {
            // 清空回收站按钮
            document.getElementById('empty-recycle-btn').addEventListener('click', function() {
                showConfirmDialog(
                    '清空回收站',
                    '您确定要清空回收站吗？此操作不可恢复。',
                    emptyRecycleBin
                );
            });
            
            // 加载回收站内容
            loadRecycledTasks();
        }

        // 初始化通知系统
        function initNotification() {
            // 关闭通知按钮
            document.getElementById('close-notification').addEventListener('click', hideNotification);
        }
        
        // 初始化提醒系统
        function initReminders() {
            // 关闭提醒按钮
            document.getElementById('dismiss-reminder').addEventListener('click', function() {
                document.getElementById('task-reminder').classList.add('hidden');
            });
            
            // 稍后提醒按钮
            document.getElementById('snooze-reminder').addEventListener('click', function() {
                document.getElementById('task-reminder').classList.add('hidden');
                // 5分钟后再次提醒
                setTimeout(function() {
                    showTaskReminder(currentReminderTask);
                }, 5 * 60 * 1000);
            });
        }
        
        // 请求通知权限
        function requestNotificationPermission() {
            if ('Notification' in window) {
                Notification.requestPermission().then(function(permission) {
                    notificationPermission = permission;
                    if (permission === 'granted') {
                        showNotification('通知已启用', '您将收到任务到期提醒', 'success');
                    } else {
                        showNotification('通知已禁用', '请在浏览器设置中允许通知以接收任务提醒', 'warning');

                });

        // 初始化优先级图表
        function initPriorityChart() {
            const ctx = document.getElementById('priority-chart').getContext('2d');
            priorityChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['低', '中', '高'],
                    datasets: [{
                        data: [0, 0, 0],
                        backgroundColor: [
                            '#22c55e',
                            '#f59e0b',
                            '#ef4444'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.label || '';
                                    const value = context.raw || 0;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = total > 0 ? Math.round((value / total) * 100) : 0;
                                    return `${label}: ${value} (${percentage}%)`;

                            }
                        }
                    }
                }
            });

        // 加载任务
        function loadTasks() {
            // 从本地存储加载任务
            tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            
            // 渲染任务列表
            renderTasks();
            
            // 更新统计信息
            updateTaskStatistics();
            
            // 更新优先级图表
            updatePriorityChart();
        }

        // 渲染任务列表
        function renderTasks() {
            const tasksList = document.getElementById('tasks-list');
            const filteredTasks = getFilteredTasks();
            
            if (filteredTasks.length === 0) {
                tasksList.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        暂无任务，请添加新任务
                    </div>
                `;

            }
            
            tasksList.innerHTML = filteredTasks.map(task => `
                <div class="task-item p-3 border border-gray-200 rounded-md hover:bg-gray-50 transition-all flex items-center justify-between" data-id="${task.id}">

                        <div class="flex-shrink-0 mr-3">
                            <input type="checkbox" class="task-checkbox h-5 w-5 text-primary rounded border-gray-300 focus:ring-primary" 
                                ${task.status === 'completed' ? 'checked' : ''} 
                                onchange="toggleTaskStatus('${task.id}')">
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center">
                                <span class="text-sm text-gray-500 mr-2">${task.id.substring(0, 6)}</span>

                                    ${task.title}
                                </h4>
                            </div>
                            ${task.description ? `
                                <p class="text-sm text-gray-600 mt-1 ${task.status === 'completed' ? 'line-through text-gray-400' : ''}">
                                    ${task.description}
                                </p>
                            ` : ''}
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        ${task.dueDateTime ? `
                            <div class="flex items-center text-sm ${isOverdue(task.dueDateTime) && task.status !== 'completed' ? 'text-red-500' : 'text-gray-500'}">
                                <i class="fa fa-clock-o mr-1"></i>
                                ${formatDateTime(task.dueDateTime)}
                                ${isOverdue(task.dueDateTime) && task.status !== 'completed' ? 
                                    '<span class="ml-1 text-red-500">（已逾期）</span>' : ''}
                            </div>
                        ` : ''}
                        <span class="badge ${getPriorityBadgeClass(task.priority)} font-medium">
                            ${getPriorityText(task.priority)}
                        </span>
                        <div class="flex space-x-2">
                            <button class="px-3 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 transition-colors text-sm" onclick="editTask('${task.id}')">

                            </button>
                            <button class="px-3 py-1 bg-red-100 text-red-700 rounded hover:bg-red-200 transition-colors text-sm" onclick="deleteTask('${task.id}')">

        // 获取筛选后的任务
        function getFilteredTasks() {
            const priorityFilter = document.getElementById('priority-filter').value;
            const statusFilter = document.getElementById('status-filter').value;
            const dueDateFilter = document.getElementById('due-date-filter').value;
            
            return tasks.filter(task => {
                const priorityMatch = priorityFilter === 'all' || task.priority === priorityFilter;
                const statusMatch = statusFilter === 'all' || task.status === statusFilter;
                const dueDateMatch = !dueDateFilter || task.dueDate === dueDateFilter;
                
                return priorityMatch && statusMatch && dueDateMatch;
            });
        }

        // 筛选任务
        function filterTasks() {
            renderTasks();
        }

        // 更新任务统计信息
        function updateTaskStatistics() {
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(task => task.status === 'completed').length;
            const inProgressTasks = tasks.filter(task => task.status === 'in-progress').length;
            const highPriorityTasks = tasks.filter(task => task.priority === 'high').length;
            const pendingTasks = tasks.filter(task => task.status === 'pending').length;
            
            const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            
            document.getElementById('completion-rate').textContent = `${completedTasks}/${totalTasks} (${completionRate}%)`;
            document.getElementById('total-tasks').textContent = totalTasks;
            document.getElementById('completed-tasks').textContent = completedTasks;
            document.getElementById('in-progress-tasks').textContent = inProgressTasks;
            document.getElementById('high-priority-tasks').textContent = highPriorityTasks;
            document.getElementById('pending-tasks').textContent = pendingTasks;
        }

        // 更新优先级图表
        function updatePriorityChart() {
            const lowPriority = tasks.filter(task => task.priority === 'low').length;
            const mediumPriority = tasks.filter(task => task.priority === 'medium').length;
            const highPriority = tasks.filter(task => task.priority === 'high').length;
            
            priorityChart.data.datasets[0].data = [lowPriority, mediumPriority, highPriority];
            priorityChart.update();
        }

        // 打开任务模态框
        function openTaskModal(taskId = null) {
            const modal = document.getElementById('task-modal');
            const title = document.getElementById('task-modal-title');
            const form = document.getElementById('task-form');
            
            // 重置表单
            form.reset();
            document.getElementById('task-id').value = '';
            
            if (taskId) {
                // 编辑现有任务
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    title.textContent = '编辑任务';
                    document.getElementById('task-id').value = task.id;
                    document.getElementById('task-title').value = task.title;
                    document.getElementById('task-description').value = task.description || '';
                    document.getElementById('task-priority').value = task.priority;
                    
                    // 设置日期和时间
                    if (task.dueDateTime) {
                        const dueDate = new Date(task.dueDateTime);
                        document.getElementById('task-due-date').value = dueDate.toISOString().split('T')[0];
                        document.getElementById('task-due-time').value = dueDate.toTimeString().split(' ')[0].substring(0, 5);
                    } else {
                        document.getElementById('task-due-date').value = task.dueDate || '';
                        document.getElementById('task-due-time').value = '';
                    }
                    
                    document.getElementById('task-status').value = task.status;
                    
                    // 设置提醒选项
                    document.querySelectorAll('.reminder-option').forEach(checkbox => {
                        checkbox.checked = task.reminders && task.reminders.includes(parseInt(checkbox.value));
                    });
                }
            } else {
                // 添加新任务
                title.textContent = '添加任务';
                // 设置默认值
                document.getElementById('task-priority').value = 'medium';
                document.getElementById('task-status').value = 'pending';
                // 设置默认截止日期为明天
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                document.getElementById('task-due-date').valueAsDate = tomorrow;
                // 设置默认时间为当前时间
                const now = new Date();
                document.getElementById('task-due-time').value = now.toTimeString().split(' ')[0].substring(0, 5);
                // 清空提醒选项
                document.querySelectorAll('.reminder-option').forEach(checkbox => {
                    checkbox.checked = false;
                });
            }
            
            // 显示模态框
            modal.classList.remove('hidden');
        }

        // 关闭任务模态框
        function closeTaskModal() {
            document.getElementById('task-modal').classList.add('hidden');
        }

        // 保存任务
        function saveTask() {
            const taskId = document.getElementById('task-id').value;
            const title = document.getElementById('task-title').value.trim();
            const description = document.getElementById('task-description').value.trim();
            const priority = document.getElementById('task-priority').value;
            const dueDate = document.getElementById('task-due-date').value;
            const dueTime = document.getElementById('task-due-time').value || '00:00';
            const status = document.getElementById('task-status').value;
            
            // 获取选中的提醒选项
            const reminders = [];
            document.querySelectorAll('.reminder-option:checked').forEach(checkbox => {
                reminders.push(parseInt(checkbox.value));
            });
            
            // 合并日期和时间
            const dueDateTime = dueDate ? new Date(`${dueDate}T${dueTime}`).toISOString() : null;
            
            if (!title) {
                showNotification('错误', '任务标题不能为空', 'error');
                return;
            }
            
            if (taskId) {
                // 更新现有任务
                const taskIndex = tasks.findIndex(t => t.id === taskId);
                if (taskIndex !== -1) {
                    tasks[taskIndex] = {
                        ...tasks[taskIndex],
                        title,
                        description,
                        priority,
                        dueDate,
                        dueDateTime,
                        reminders,
                        status,
                        updatedAt: new Date().toISOString()
                    };
                    showNotification('成功', '任务已更新', 'success');
                }
            } else {
                // 添加新任务
                const newTask = {
                    id: generateId(),
                    title,
                    description,
                    priority,
                    dueDate,
                    dueDateTime,
                    reminders,
                    status,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                tasks.push(newTask);
                showNotification('成功', '任务已添加', 'success');
            }
            
            // 保存到本地存储
            localStorage.setItem('tasks', JSON.stringify(tasks));
            
            // 更新UI
            renderTasks();
            updateTaskStatistics();
            updatePriorityChart();
            
            // 关闭模态框
            closeTaskModal();
        }

        // 切换任务状态
        function toggleTaskStatus(taskId) {
            const taskIndex = tasks.findIndex(t => t.id === taskId);
            if (taskIndex !== -1) {
                const task = tasks[taskIndex];
                task.status = task.status === 'completed' ? 'pending' : 'completed';
                task.updatedAt = new Date().toISOString();
                
                // 保存到本地存储
                localStorage.setItem('tasks', JSON.stringify(tasks));
                
                // 更新UI
                renderTasks();
                updateTaskStatistics();
                updatePriorityChart();
                
                showNotification('成功', '任务状态已更新', 'success');
            }
        }

        // 编辑任务
        function editTask(taskId) {
            openTaskModal(taskId);
        }

        // 删除任务
        function deleteTask(taskId) {
            showConfirmDialog(
                '删除任务',
                '您确定要删除此任务吗？它将被移至回收站。',
                function() {
                    const taskIndex = tasks.findIndex(t => t.id === taskId);
                    if (taskIndex !== -1) {
                        const task = tasks[taskIndex];
                        
                        // 添加到回收站
                        const recycledTask = {
                            ...task,
                            recycledAt: new Date().toISOString()
                        };
                        recycledTasks.push(recycledTask);
                        localStorage.setItem('recycledTasks', JSON.stringify(recycledTasks));
                        
                        // 从任务列表中删除
                        tasks.splice(taskIndex, 1);
                        localStorage.setItem('tasks', JSON.stringify(tasks));
                        
                        // 更新UI
                        renderTasks();
                        updateTaskStatistics();
                        updatePriorityChart();
                        loadRecycledTasks();
                        
                        showNotification('成功', '任务已删除并移至回收站', 'success');
                    }
                }
            );
        }

        // 加载回收站任务
        function loadRecycledTasks() {
            const recycleList = document.getElementById('recycle-list');
            
            if (recycledTasks.length === 0) {
                recycleList.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        回收站为空
                    </div>
                `;
                return;
            }
            
            recycleList.innerHTML = recycledTasks.map(task => `
                <div class="task-item p-3 border border-gray-200 rounded-md hover:bg-gray-50 transition-all" data-id="${task.id}">
                    <div class="flex items-start">
                        <div class="ml-3 flex-1">
                            <div class="flex justify-between items-start">
                                <h4 class="text-base font-medium text-gray-800 line-through text-gray-400">
                                    ${task.title}
                                </h4>
                                <div class="flex space-x-2">
                                    <span class="badge ${getPriorityBadgeClass(task.priority)}">
                                        ${getPriorityText(task.priority)}
                                    </span>
                                </div>
                            </div>
                            ${task.description ? `
                                <p class="text-sm text-gray-600 mt-1 line-through text-gray-400">
                                    ${task.description}
                                </p>
                            ` : ''}
                            <div class="mt-2 flex items-center text-xs text-gray-500">
                                ${task.dueDate ? `
                                    <div class="flex items-center">
                                        <i class="fa fa-calendar-o mr-1"></i>
                                        ${formatDate(task.dueDate)}
                                    </div>
                                ` : ''}
                                <div class="ml-4 flex items-center">
                                    <i class="fa fa-trash-o mr-1"></i>
                                    已删除于 ${formatDateTime(task.recycledAt)}
                                </div>
                                <div class="ml-auto flex space-x-2">
                                    <button class="text-primary hover:text-blue-700" onclick="restoreTask('${task.id}')">
                                        <i class="fa fa-undo"></i> 恢复
                                    </button>
                                    <button class="text-danger hover:text-red-700" onclick="permanentlyDeleteTask('${task.id}')">
                                        <i class="fa fa-trash"></i> 永久删除
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 恢复任务
        function restoreTask(taskId) {
            const recycledTaskIndex = recycledTasks.findIndex(t => t.id === taskId);
            if (recycledTaskIndex !== -1) {
                const task = recycledTasks[recycledTaskIndex];
                
                // 从回收站中删除
                recycledTasks.splice(recycledTaskIndex, 1);
                localStorage.setItem('recycledTasks', JSON.stringify(recycledTasks));
                
                // 恢复到任务列表
                delete task.recycledAt;
                task.status = 'pending';
                task.updatedAt = new Date().toISOString();
                tasks.push(task);
                localStorage.setItem('tasks', JSON.stringify(tasks));
                
                // 更新UI
                renderTasks();
                updateTaskStatistics();
                updatePriorityChart();
                loadRecycledTasks();
                
                showNotification('成功', '任务已恢复', 'success');
            }
        }

        // 永久删除任务
        function permanentlyDeleteTask(taskId) {
            showConfirmDialog(
                '永久删除',
                '您确定要永久删除此任务吗？此操作不可恢复。',
                function() {
                    const recycledTaskIndex = recycledTasks.findIndex(t => t.id === taskId);
                    if (recycledTaskIndex !== -1) {
                        // 从回收站中删除
                        recycledTasks.splice(recycledTaskIndex, 1);
                        localStorage.setItem('recycledTasks', JSON.stringify(recycledTasks));
                        
                        // 更新UI
                        loadRecycledTasks();
                        
                        showNotification('成功', '任务已永久删除', 'success');
                    }
                }
            );

        // 清空回收站
        function emptyRecycleBin() {
            recycledTasks = [];
            localStorage.setItem('recycledTasks', JSON.stringify(recycledTasks));
            loadRecycledTasks();
            showNotification('成功', '回收站已清空', 'success');
